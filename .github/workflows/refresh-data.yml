name: Refresh camping data

on:
  schedule:
    - cron: "0 0 * * 1" # 매주 월요일 09:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run fetch-data
        env:
          GOCAMPING_API_KEY: ${{ secrets.GOCAMPING_API_KEY }}
      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- src/data/sites.json; then
            git add src/data/sites.json
            git commit -m "chore: refresh camping data"
            git push
          else
            echo "변경 사항 없음"
          fi
